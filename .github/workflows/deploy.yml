name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main  # or your default branch

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Inject secret and deploy
        run: |
          # Create a temporary file with the secret injected
          sed "s|\${{ secrets.BREVO_API_KEY }}|${{ secrets.BREVO_API_KEY }}|g" index.html > index.html.tmp
          mv index.html.tmp index.html
      
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: .

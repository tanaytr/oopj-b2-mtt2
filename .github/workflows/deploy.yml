name: Deploy

on:
  push:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Inject API Key into HTML
        env:
          BREVO_KEY: ${{ secrets.BREVO_API_KEY }}
        run: |
          sed -i "s/BREVO_API_KEY_PLACEHOLDER/$BREVO_KEY/g" index.html
          echo "✅ API key injected"

      - name: Setup Pages
        uses: actions/configure-pages@v3

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v2
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v2
